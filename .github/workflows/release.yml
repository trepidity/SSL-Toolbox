name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: ssl-toolbox
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: ssl-toolbox
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            binary_name: ssl-toolbox.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            binary_name: ssl-toolbox
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            binary_name: ssl-toolbox

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }} -p ssl-toolbox

      - name: Test (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        env:
          SSL_TOOLBOX_ENABLE_WINDOWS_LIVE_TESTS: "1"
        run: cargo test --workspace

      - name: Package (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          ARCHIVE_NAME="ssl-toolbox-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${ARCHIVE_NAME}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $archiveName = "ssl-toolbox-$($env:GITHUB_REF_NAME)-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $archiveName
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$archiveName/"
          Copy-Item "README.md", "LICENSE-MIT", "LICENSE-APACHE" "$archiveName/"
          Compress-Archive -Path "$archiveName/*" -DestinationPath "$archiveName.zip"
          "ARCHIVE=$archiveName.zip" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ssl-toolbox-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ssl-toolbox-* > sha256sums.txt
          cat sha256sums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ssl-toolbox-*.tar.gz
            artifacts/ssl-toolbox-*.zip
            artifacts/sha256sums.txt
