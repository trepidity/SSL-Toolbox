name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    env:
      PACKAGE_VERSION: ${{ needs.prepare.outputs.package_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: ssl-toolbox
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_name: ssl-toolbox
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            binary_name: ssl-toolbox.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            binary_name: ssl-toolbox
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            binary_name: ssl-toolbox

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }} -p ssl-toolbox

      - name: Package (Unix)
        if: matrix.archive_ext == 'tar.gz'
        run: |
          ARCHIVE_NAME="ssl-toolbox-v${PACKAGE_VERSION}-${{ matrix.target }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${ARCHIVE_NAME}/"
          cp README.md LICENSE-MIT LICENSE-APACHE "${ARCHIVE_NAME}/"
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $archiveName = "ssl-toolbox-v$($env:PACKAGE_VERSION)-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $archiveName
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$archiveName/"
          Copy-Item "README.md", "LICENSE-MIT", "LICENSE-APACHE" "$archiveName/"
          Compress-Archive -Path "$archiveName/*" -DestinationPath "$archiveName.zip"
          "ARCHIVE=$archiveName.zip" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ssl-toolbox-v${{ env.PACKAGE_VERSION }}-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  prepare:
    name: Resolve package version
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.package_version.outputs.value }}
    steps:
      - uses: actions/checkout@v5

      - name: Read workspace package version
        id: package_version
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const cargoToml = fs.readFileSync('Cargo.toml', 'utf8');
            const match = cargoToml.match(/\[workspace\.package\][\s\S]*?^version\s*=\s*"([^"]+)"/m);
            if (!match) {
              core.setFailed('Could not find [workspace.package].version in Cargo.toml');
              return;
            }
            core.setOutput('value', match[1]);

      - name: Validate tag matches package version
        run: |
          EXPECTED_TAG="v${{ steps.package_version.outputs.value }}"
          if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${EXPECTED_TAG}" >&2
            exit 1
          fi

  release:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum ssl-toolbox-* > sha256sums.txt
          cat sha256sums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ssl-toolbox v${{ needs.prepare.outputs.package_version }}
          files: |
            artifacts/ssl-toolbox-v${{ needs.prepare.outputs.package_version }}-*.tar.gz
            artifacts/ssl-toolbox-v${{ needs.prepare.outputs.package_version }}-*.zip
            artifacts/sha256sums.txt
